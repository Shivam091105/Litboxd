<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Write Review</title>
<link rel="stylesheet" href="style.css">
</head>
<script src="script.js"></script>
<body>

<header>
<div class="logo">LitCircle</div>
</header>

<section class="container">

<div class="card">  

<form id="reviewForm">

<fieldset>
<legend>Write Your Review</legend>

<label>Name</label>
<input type="text" onfocus="console.log('Focus')" required>
<br><br>

<label>Rating</label>
<input type="radio" name="rate">1
<input type="radio" name="rate">2
<input type="radio" name="rate">3
<input type="radio" name="rate">4
<input type="radio" name="rate">5

<br><br>

<label>Genre</label>

<select onchange="console.log('Changed')">
<optgroup label="Genres">
<option>Fantasy</option>
<option>Drama</option>
<option>Sci-Fi</option>
</optgroup>
</select>

<br><br>

<label>Review Text</label>
<textarea onselect="console.log('Selected Text')"></textarea>

<br><br>

<input type="checkbox"> Contains Spoiler
<br><br>

<button type="submit">Submit</button>
<button type="reset">Reset</button>

</fieldset>

</form>

</div>

</section>

</body>
</html>
